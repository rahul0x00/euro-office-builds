name: Build AppImage

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/archlinux/archlinux:latest
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syyu --noconfirm
          pacman -S --noconfirm \
            git \
            sudo \
            docker \
            wget \
            jq \
            fuse2 \
            desktop-file-utils \
            grep \
            awk \
            cpio

      - name: Create builder user
        run: |
          useradd -m builder || true
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

          DOCKER_GID=$(stat -c '%g' /var/run/docker.sock)
          groupadd -g "$DOCKER_GID" docker 2>/dev/null || true
          usermod -aG docker builder

          chmod 666 /var/run/docker.sock

      - name: Install yay
        run: |
          sudo -u builder bash -c '
            cd ~
            git clone https://aur.archlinux.org/yay-bin.git
            cd yay-bin
            makepkg -si --noconfirm
          '

      - name: Get latest tag
        id: tag
        run: |
          TAG=$(curl -s https://api.github.com/repos/Euro-Office/DesktopEditors/tags | jq -r '.[0].name')
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Clone PKGBUILD
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PKGVER="${TAG#v}"

          sudo -u builder git clone \
            https://aur.archlinux.org/euro-office-desktopeditors-git.git \
            /home/builder/pkg

          cd /home/builder/pkg

          sed -i '/pkgver() {/,/}/d' PKGBUILD
          sed -i "s/pkgver=.*/pkgver=$PKGVER/" PKGBUILD
          sed -i "s/pkgname=euro-office-desktopeditors-git/pkgname=euro-office-desktopeditors/" PKGBUILD
          sed -i "s/conflicts=.*/conflicts=('euro-office-desktopeditors-git')/" PKGBUILD
          sed -i "s|source=(\"git+https://github.com/Euro-Office/DesktopEditors.git\")|source=(\"git+https://github.com/Euro-Office/DesktopEditors.git#tag=$TAG\")|" PKGBUILD

          sed -i \
            's/docker buildx bake packages/docker buildx bake --allow=fs=\/tmp --allow=fs.read=.. packages/' \
            PKGBUILD

      - name: Build package
        run: |
          cd /home/builder/pkg

          chown -R builder:builder /home/builder/pkg

          sudo -u builder yay -S --noconfirm libtiff5
          sudo -u builder makepkg -s --noconfirm

      - name: Find package
        id: pkg
        run: |
          cd /home/builder/pkg

          PKGFILE=$(find . -maxdepth 1 -name "*.pkg.tar.zst" | head -n 1)

          cp "$PKGFILE" "${{ github.workspace }}/"

          echo "pkgfile=$(basename "$PKGFILE")" >> $GITHUB_OUTPUT

      - name: Build AppImage
        run: |
          cd "${{ github.workspace }}"

          mkdir AppDir

          tar -I zstd -xvf "${{ steps.pkg.outputs.pkgfile }}" -C AppDir

          cd AppDir

          cat > AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"

          export LD_LIBRARY_PATH="${HERE}/usr/lib:${HERE}/opt/eurooffice/desktopeditors:${LD_LIBRARY_PATH}"
          export XDG_DATA_DIRS="${HERE}/usr/share:${XDG_DATA_DIRS}"

          exec "${HERE}/usr/bin/euro-office-desktopeditors" "$@"
          EOF

          chmod +x AppRun

          cp usr/share/applications/euro-office-desktopeditors.desktop . || true

          ICON=$(find usr/share/icons -name "*.png" | head -n 1)

          if [ -n "$ICON" ]; then
            cp "$ICON" .
          fi

          sed -i \
            's|Exec=/usr/bin/euro-office-desktopeditors|Exec=euro-office-desktopeditors|' \
            euro-office-desktopeditors.desktop || true

          cd ..

          wget \
            -O appimagetool.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage

          chmod +x appimagetool.AppImage

          ./appimagetool.AppImage \
            --appimage-extract-and-run \
            AppDir \
            EuroOffice.AppImage

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Euro-Office Desktop Editors ${{ steps.tag.outputs.tag }}
          files: EuroOffice.AppImage
